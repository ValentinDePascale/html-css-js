<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de Selectores CSS</title>
    <style>
        /* Selector por etiqueta */
        p {
            color: blue;
            font-size: 18px;
        }

        /* Selector por clase */
        .destacado {
            background-color: yellow;
            font-weight: bold;
            padding: 40px;
        }

        /* Selector por ID */
        #titulo {
            color: red;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1 id="titulo">Bienvenidos</h1>
    <p>Este es un párrafo con estilo predeterminado.</p>
    <p class="destacado">Este párrafo está resaltado con una clase.</p>
</body>
</html>
